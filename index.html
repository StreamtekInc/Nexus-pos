<!DOCTYPE html>
<html>
<head>
<title>Nexus POS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
body{
background:#020617;
color:white;
font-family:sans-serif;
}
</style>

</head>
<body>

<div id="root"></div>

<script>

const stations = [
"PC1","PC2","PC3","PC4","PC5","PC6","PC7","PC8",
"Laptop1","Laptop2","Laptop3","Laptop4","Laptop5","Laptop6","Laptop7","Laptop8",
"Xbox","PlayStation"
]

function App(){

const [sessions,setSessions] = React.useState([])
const [name,setName] = React.useState("")
const [station,setStation] = React.useState("")

function startSession(minutes){

if(!name || !station){
alert("Enter name and station")
return
}

const end = Date.now() + minutes*60000

setSessions([...sessions,{
name,
station,
end
}])

setName("")
setStation("")
}

function endSession(i){

const s=[...sessions]
s.splice(i,1)

setSessions(s)

}

return React.createElement("div",{className:"p-8"},

React.createElement("h1",{className:"text-3xl mb-6"},"THE COLLECTIVE NEXUS POS"),

React.createElement("div",{className:"mb-4"},
React.createElement("input",{
placeholder:"Player Name",
value:name,
onChange:e=>setName(e.target.value),
className:"text-black p-2 mr-2 rounded"
}),

React.createElement("select",{
value:station,
onChange:e=>setStation(e.target.value),
className:"text-black p-2 rounded"
},

React.createElement("option",{value:""},"Select Station"),

stations.map(s=>
React.createElement("option",{key:s,value:s},s)
)

)
),

React.createElement("div",{className:"mb-6 flex gap-3"},
React.createElement("button",{className:"bg-green-600 p-3 rounded",onClick:()=>startSession(60)},"1 Hour"),
React.createElement("button",{className:"bg-green-600 p-3 rounded",onClick:()=>startSession(120)},"2 Hour"),
React.createElement("button",{className:"bg-green-600 p-3 rounded",onClick:()=>startSession(240)},"4 Hour")
),

React.createElement("h2",{className:"text-xl mb-3"},"Active Sessions"),

sessions.map((s,i)=>{

const mins=Math.max(0,Math.floor((s.end-Date.now())/60000))

return React.createElement("div",{key:i,className:"bg-slate-800 p-3 mb-2 rounded flex justify-between"},

React.createElement("div",null,
s.station+" - "+s.name+" - "+mins+"m"
),

React.createElement("button",{
className:"bg-red-600 px-3 rounded",
onClick:()=>endSession(i)
},"End")

)

})

)

}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App))

</script>

</body>
</html>
